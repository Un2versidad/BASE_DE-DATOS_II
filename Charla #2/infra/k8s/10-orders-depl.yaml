apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: emmann/orders
          #imagePullPolicy: Never
          # resources:
          #   limits:
          #     cpu: "1"
          #     memory: "300Mi"
          #   requests:
          #     cpu: "1"
          #     memory: "200Mi"

          # resources:
          #   cpu: 200m
          #   memory: 0.2Gi
          # limits:
          #   cpu: 300m
          #   memory: 0.3Gi
          env:
            - name: MONGO_URI
              value: "mongodb://orders-mongo-srv:27017/orders"
            - name: NODE_ENV
              value: "development"
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_KEY
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: ADMIN_EMAIL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_ORDERS_URL
            - name: RABBITMQ_REQUIRE_TLS
              value: "true"
            - name: RABBITMQ_TLS_CA_CERT
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-ca-cert
                  key: ca.crt
            - name: API_RATE_LIMIT_ENABLED
              value: "true"
            - name: API_RATE_LIMIT_MAX_ATTEMPTS
              value: "300"
            - name: API_RATE_LIMIT_WINDOW_MS
              value: "900000"
            - name: ALLOWED_ORIGINS
              value: "http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000"
---
apiVersion: v1
kind: Service
metadata:
  name: orders-srv
spec:
  selector:
    app: orders
  ports:
    - name: orders
      protocol: TCP
      port: 3000
      targetPort: 3000
