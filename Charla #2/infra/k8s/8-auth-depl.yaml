apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: emmann/auth
          #imagePullPolicy: Never
          # resources:
          #   limits:
          #     cpu: "1"
          #     memory: "300Mi"
          #   requests:
          #     cpu: "1"
          #     memory: "200Mi"
          env:
            - name: MONGO_URI
              value: "mongodb://auth-mongo-srv:27017/auth"
            - name: NODE_ENV
              value: "development"
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_KEY
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: ADMIN_EMAIL
            - name: HCAPTCHA_REQUIRED
              value: "true"
            - name: HCAPTCHA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: hcaptcha-secret
                  key: HCAPTCHA_SECRET_KEY
            - name: AUTH_RATE_LIMIT_ENABLED
              value: "true"
            - name: AUTH_RATE_LIMIT_MAX_ATTEMPTS
              value: "20"
            - name: AUTH_RATE_LIMIT_WINDOW_MS
              value: "600000"
            - name: API_RATE_LIMIT_ENABLED
              value: "true"
            - name: API_RATE_LIMIT_MAX_ATTEMPTS
              value: "300"
            - name: API_RATE_LIMIT_WINDOW_MS
              value: "900000"
            - name: ALLOWED_ORIGINS
              value: "http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000"
            - name: ACCESS_TOKEN_TTL_SECONDS
              value: "900"
            - name: REFRESH_TOKEN_TTL_DAYS
              value: "7"

---
apiVersion: v1
kind: Service
metadata:
  name: auth-srv
spec:
  selector:
    app: auth
  ports:
    - name: auth
      protocol: TCP
      port: 3000
      targetPort: 3000
