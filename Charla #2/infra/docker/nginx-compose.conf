map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 20m;
  resolver 127.0.0.11 ipv6=off valid=5s;

  set $auth_upstream http://auth:3000;
  set $auth_api http://auth:3000/api/users;
  set $auth_api_v1 http://auth:3000/api/v1/users;
  set $auth_session_api_v1 http://auth:3000/api/v1/auth;
  set $tickets_upstream http://tickets:3000;
  set $tickets_api http://tickets:3000/api/tickets;
  set $tickets_api_v1 http://tickets:3000/api/v1/tickets;
  set $orders_upstream http://orders:3000;
  set $orders_api http://orders:3000/api/orders;
  set $orders_api_v1 http://orders:3000/api/v1/orders;
  set $payments_upstream http://payments:3000;
  set $payments_api http://payments:3000/api/payments;
  set $payments_api_v1 http://payments:3000/api/v1/payments;
  set $client_upstream http://client:3000;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
  proxy_read_timeout 300s;

  location = /api/payments {
    proxy_pass $payments_api;
  }

  location ^~ /api/payments/ {
    proxy_pass $payments_upstream;
  }

  location = /api/v1/payments {
    proxy_pass $payments_api_v1;
  }

  location ^~ /api/v1/payments/ {
    proxy_pass $payments_upstream;
  }

  location = /api/users {
    proxy_pass $auth_api;
  }

  location ^~ /api/users/ {
    proxy_pass $auth_upstream;
  }

  location = /api/v1/users {
    proxy_pass $auth_api_v1;
  }

  location ^~ /api/v1/users/ {
    proxy_pass $auth_upstream;
  }

  location = /api/v1/auth {
    proxy_pass $auth_session_api_v1;
  }

  location ^~ /api/v1/auth/ {
    proxy_pass $auth_upstream;
  }

  location = /api/tickets {
    proxy_pass $tickets_api;
  }

  location ^~ /api/tickets/ {
    proxy_pass $tickets_upstream;
  }

  location = /api/v1/tickets {
    proxy_pass $tickets_api_v1;
  }

  location ^~ /api/v1/tickets/ {
    proxy_pass $tickets_upstream;
  }

  location = /api/orders {
    proxy_pass $orders_api;
  }

  location ^~ /api/orders/ {
    proxy_pass $orders_upstream;
  }

  location = /api/v1/orders {
    proxy_pass $orders_api_v1;
  }

  location ^~ /api/v1/orders/ {
    proxy_pass $orders_upstream;
  }

  location / {
    proxy_pass $client_upstream;
  }
}
