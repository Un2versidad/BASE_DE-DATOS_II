services:
  mariadb:
    image: mariadb:11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: expedientes
      MYSQL_USER: app
      MYSQL_PASSWORD: strongpassword
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build: ./backend
    ports:
      - "5001:5000"
    depends_on:
      - mariadb
    environment:
      DB_HOST: mariadb
      DB_USER: app
      DB_PASS: strongpassword
      DB_NAME: expedientes
      JWT_SECRET: supersecret-supersecret-supersecret-32chars
      CORS_ORIGINS: http://localhost:8080
      AUTO_BOOTSTRAP: "1"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    volumes:
      - ./backend:/app

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  db_data:
